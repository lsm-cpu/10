<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.3 Wildlife Conservation (Smart Audio)</title>
    <style>
        :root {
            --primary: #2e7d32; /* Forest Green */
            --secondary: #8d6e63; /* Earth Brown */
            --accent: #0288d1; /* Ocean Blue */
            --bg: #e8f5e9; /* Light Nature Green */
            --card: #ffffff;
            --text: #37474f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 850px;
            text-align: center;
            border-top: 5px solid var(--primary);
        }

        h1 { color: var(--primary); margin-bottom: 5px; font-weight: 700; }
        p { color: #546e7a; margin-top: 0; }

        /* Syllable Colors (Earthy/Nature tones) */
        .syl-1 { color: #c62828; }
        .syl-2 { color: #1565c0; }
        .syl-3 { color: #2e7d32; }
        .syl-4 { color: #e65100; }
        .syl-5 { color: #6a1b9a; }
        .syl-6 { color: #00838f; }
        .syl-7 { color: #d84315; }

        .word-display {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 20px 0;
            padding: 25px;
            background: #f1f8e9;
            border-radius: 10px;
            border: 2px solid #c5e1a5;
            letter-spacing: 0.5px;
            line-height: 1.6;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Inputs & Buttons */
        input {
            padding: 12px;
            margin: 8px;
            border: 2px solid #bcaaa4;
            border-radius: 6px;
            font-size: 1rem;
            width: 200px;
            text-align: center;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); filter: brightness(1.1); }
        .btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .btn-core { background-color: #4caf50; }
        .btn-inter { background-color: #ff9800; }
        .btn-adv { background-color: #d32f2f; }

        .btn-mic {
            background-color: var(--accent);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2.5rem;
            justify-content: center;
            margin-top: 15px;
            padding: 0;
        }

        .mic-listening { animation: pulse 1.5s infinite; background-color: #e53935; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(229, 57, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0); }
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #dcedc8;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .option-card {
            background: white;
            border: 2px solid #cfd8dc;
            padding: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
            text-align: left;
        }
        .option-card:hover { border-color: var(--primary); background: #f1f8e9; }

        .hidden { display: none !important; }
        .feedback { min-height: 30px; margin-top: 15px; font-weight: bold; font-size: 1.2rem; }
        
        .table-wrapper { max-height: 300px; overflow-y: auto; margin: 20px 0; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: var(--primary); color: white; position: sticky; top: 0; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <!-- Screen 1: Registration -->
    <div id="screen-login">
        <h1>S.3 Threats to Wildlife</h1>
        <p>Module 5 Vocabulary (Smart Audio & Word-by-Word Mode)</p>
        <br>
        <input type="text" id="sName" placeholder="Student Name">
        <br>
        <div style="display: flex; justify-content: center; gap: 10px;">
            <input type="text" id="sClass" placeholder="Class (e.g. 3A)" style="width: 100px;">
            <input type="text" id="sNo" placeholder="Class No." style="width: 100px;">
        </div>
        <br>
        <p>Select Challenge Level:</p>
        <button class="btn btn-core" onclick="startGame('Core')">Core (★)</button>
        <button class="btn btn-inter" onclick="startGame('Intermediate')">Intermediate (★★)</button>
        <button class="btn btn-adv" onclick="startGame('Advanced')">Advanced (★★★)</button>
    </div>

    <!-- Screen 2: Game Loop -->
    <div id="screen-game" class="hidden">
        <div class="scoreboard">
            <span>🗣️ Speak: <span id="score-speak">0</span></span>
            <span>🧩 Match: <span id="score-match">0</span></span>
            <span>Progress: <span id="progress-text">1/10</span></span>
        </div>

        <!-- Phase 1: Speaking -->
        <div id="phase-speak">
            <h2>Step 1: Listen & Read Aloud</h2>
            
            <div id="word-syllables" class="word-display"></div>
            
            <button class="btn" onclick="playAudioWordByWord()" style="background-color: var(--secondary);">
                <span>🔊</span> Listen (Word-by-Word)
            </button>
            <br>
            <button class="btn btn-mic" id="mic-btn" onclick="activateMic()">🎤</button>
            <div id="mic-status" style="margin-top:10px; color:#888;">Tap mic to speak</div>
            <div id="feedback-speak" class="feedback"></div>
        </div>

        <!-- Phase 2: Matching -->
        <div id="phase-match" class="hidden">
            <h2>Step 2: Match Meaning</h2>
            <div id="match-word" style="font-size: 1.8rem; font-weight: bold; color: var(--primary); margin: 20px 0;"></div>
            <div id="options-container" class="options-grid"></div>
            <div id="feedback-match" class="feedback"></div>
        </div>
    </div>

    <!-- Screen 3: Results -->
    <div id="screen-result" class="hidden">
        <h1>Challenge Complete!</h1>
        <h2>Total Score: <span id="final-total"></span></h2>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Phrase</th>
                        <th>Speak</th>
                        <th>Match</th>
                    </tr>
                </thead>
                <tbody id="result-tbody"></tbody>
            </table>
        </div>

        <button class="btn" onclick="exportCSV()">📥 Export Results (CSV)</button>
        <button class="btn" onclick="location.reload()" style="background-color: #546e7a;">Play Again</button>
    </div>
</div>

<script>
    // --- S.3 Vocabulary Database (Module 5: Threats to Wildlife) ---
    // Note: Symbols and variations cleaned up for TTS & Voice Recognition.
    const vocabData = {
        Core: [
            { w: "feeding wild animals", syl: ["feed", "ing", " ", "wild", " ", "an", "i", "mals"], m: "餵飼野生動物" },
            { w: "habitat loss", syl: ["hab", "i", "tat", " ", "loss"], m: "棲息地喪失" },
            { w: "oil spill", syl: ["oil", " ", "spill"], m: "漏油事件" },
            { w: "overfishing", syl: ["o", "ver", "fish", "ing"], m: "過度捕魚" },
            { w: "poaching", syl: ["poach", "ing"], m: "非法捕獵" },
            { w: "change the eating habits", syl: ["change", " ", "the", " ", "eat", "ing", " ", "ha", "bits"], m: "改變飲食習慣" },
            { w: "be aggressive for food", syl: ["be", " ", "ag", "gres", "sive", " ", "for", " ", "food"], m: "為食物變得具攻擊性" },
            { w: "put animal at risk", syl: ["put", " ", "an", "i", "mal", " ", "at", " ", "risk"], m: "讓動物處於危險之中" },
            { w: "need better or stricter laws", syl: ["need", " ", "bet", "ter", " ", "or", " ", "stric", "ter", " ", "laws"], m: "需要更好/更嚴格的法律" },
            { w: "donate money to a charity", syl: ["do", "nate", " ", "mo", "ney", " ", "to", " ", "a", " ", "char", "i", "ty"], m: "捐錢給慈善機構" },
            { w: "sign a petition", syl: ["sign", " ", "a", " ", "pe", "ti", "tion"], m: "簽署請願書" },
            { w: "need more public action", syl: ["need", " ", "more", " ", "pub", "lic", " ", "ac", "tion"], m: "需要更多公眾行動" },
            { w: "unacceptable", syl: ["un", "ac", "cep", "ta", "ble"], m: "不可接受的" },
            { w: "extremely important", syl: ["ex", "treme", "ly", " ", "im", "por", "tant"], m: "極度重要的" },
            { w: "heartbreaking", syl: ["heart", "break", "ing"], m: "令人心碎的" },
            { w: "awful", syl: ["aw", "ful"], m: "糟糕的" }
        ],
        Intermediate: [
            { w: "ivory trading", syl: ["i", "vo", "ry", " ", "tra", "ding"], m: "象牙貿易" },
            { w: "illegal fishing", syl: ["il", "le", "gal", " ", "fish", "ing"], m: "非法捕魚" },
            { w: "shark finning", syl: ["shark", " ", "fin", "ning"], m: "割取鯊魚鰭" },
            { w: "whale hunting", syl: ["whale", " ", "hunt", "ing"], m: "捕鯨" },
            { w: "wander into the city", syl: ["wan", "der", " ", "in", "to", " ", "the", " ", "ci", "ty"], m: "闖入城市" },
            { w: "snatch people's bag of food", syl: ["snatch", " ", "peo", "ple's", " ", "bag", " ", "of", " ", "food"], m: "搶奪人們的一袋食物" },
            { w: "extinction", syl: ["ex", "tinc", "tion"], m: "絕種" },
            { w: "pay a heavy fine", syl: ["pay", " ", "a", " ", "hea", "vy", " ", "fine"], m: "繳交巨額罰款" },
            { w: "raise awareness of animal conservation", syl: ["raise", " ", "a", "ware", "ness", " ", "of", " ", "an", "i", "mal", " ", "con", "ser", "va", "tion"], m: "提高對動物保育的意識" },
            { w: "nature reserve", syl: ["na", "ture", " ", "re", "serve"], m: "自然保護區" },
            { w: "a shark-free menu", syl: ["a", " ", "shark", "-", "free", " ", "me", "nu"], m: "無鯊魚菜單" },
            { w: "critical", syl: ["cri", "ti", "cal"], m: "關鍵的/危急的" },
            { w: "inspiring", syl: ["in", "spi", "ring"], m: "鼓舞人心的" },
            { w: "short-sighted", syl: ["short", "-", "sigh", "ted"], m: "目光短淺的" }
        ],
        Advanced: [
            { w: "ivory tusks", syl: ["i", "vo", "ry", " ", "tusks"], m: "象牙" },
            { w: "irreversible impact", syl: ["ir", "re", "ver", "si", "ble", " ", "im", "pact"], m: "不可逆轉的影響" },
            { w: "upset the balance of the local ecosystem", syl: ["up", "set", " ", "the", " ", "ba", "lance", " ", "of", " ", "the", " ", "lo", "cal", " ", "e", "co", "sys", "tem"], m: "破壞當地生態系統的平衡" },
            { w: "get accustomed to being fed with human food", syl: ["get", " ", "ac", "cus", "tomed", " ", "to", " ", "be", "ing", " ", "fed", " ", "with", " ", "hu", "man", " ", "food"], m: "習慣被餵食人類食物" },
            { w: "intrude into residential areas", syl: ["in", "trude", " ", "in", "to", " ", "re", "si", "den", "tial", " ", "a", "re", "as"], m: "闖入住宅區" },
            { w: "cause nuisances", syl: ["cause", " ", "nui", "san", "ces"], m: "造成滋擾" },
            { w: "regulate oil exploration", syl: ["reg", "u", "late", " ", "oil", " ", "ex", "plo", "ra", "tion"], m: "監管石油勘探" },
            { w: "impose an ivory ban", syl: ["im", "pose", " ", "an", " ", "i", "vo", "ry", " ", "ban"], m: "實施象牙禁令" },
            { w: "boycott companies that threaten wildlife", syl: ["boy", "cott", " ", "com", "pa", "nies", " ", "that", " ", "threa", "ten", " ", "wild", "life"], m: "杯葛威脅野生動物的公司" },
            { w: "illicit", syl: ["il", "li", "cit"], m: "非法的" }
        ]
    };

    // --- State ---
    let session = {
        name: "", class: "", no: "", level: "",
        queue: [], idx: 0,
        scoreSpeak: 0, scoreMatch: 0,
        logs: []
    };
    let attempts = 0;
    let recognition;
    let isSpeaking = false;
    let availableVoices = [];

    // --- Voice Setup ---
    window.speechSynthesis.onvoiceschanged = () => {
        availableVoices = window.speechSynthesis.getVoices();
    };

    function getBritishVoice() {
        if (availableVoices.length === 0) availableVoices = window.speechSynthesis.getVoices();
        const britishVoice = availableVoices.find(voice => 
            voice.lang.includes('GB') || voice.name.includes('UK') || voice.name.includes('British')
        );
        return britishVoice || availableVoices.find(voice => voice.lang.includes('en')) || null;
    }

    // --- Init ---
    function startGame(level) {
        const n = document.getElementById('sName').value;
        const c = document.getElementById('sClass').value;
        const no = document.getElementById('sNo').value;

        if(!n || !c || !no) { alert("Please enter Name, Class, and Number."); return; }

        session.name = n; session.class = c; session.no = no; session.level = level;
        
        // Randomize the queue
        session.queue = [...vocabData[level]]; 
        session.queue.sort(() => Math.random() - 0.5);

        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');

        setupSpeechRecognition();
        loadWord();
    }

    function setupSpeechRecognition() {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-GB';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onresult = (e) => checkSpeech(e.results[0][0].transcript);
            recognition.onerror = () => { 
                document.getElementById('mic-status').innerText = "⚠️ Error. Try again.";
                document.getElementById('mic-btn').classList.remove('mic-listening');
                isSpeaking = false;
            };
            recognition.onend = () => { 
                document.getElementById('mic-btn').classList.remove('mic-listening');
                isSpeaking = false;
            };
        } else {
            alert("Please use Google Chrome for Speech Recognition features.");
        }
    }

    // --- Game Logic ---
    function loadWord() {
        if (session.idx >= session.queue.length) {
            endGame();
            return;
        }

        const current = session.queue[session.idx];
        attempts = 0;
        
        document.getElementById('score-speak').innerText = session.scoreSpeak;
        document.getElementById('score-match').innerText = session.scoreMatch;
        document.getElementById('progress-text').innerText = `${session.idx + 1}/${session.queue.length}`;
        
        document.getElementById('phase-speak').classList.remove('hidden');
        document.getElementById('phase-match').classList.add('hidden');
        document.getElementById('feedback-speak').innerText = "";
        document.getElementById('mic-status').innerText = "Tap mic to speak";

        // Render Syllables
        const display = document.getElementById('word-syllables');
        display.innerHTML = "";
        current.syl.forEach((s, i) => {
            const span = document.createElement('span');
            span.innerText = s;
            if (s.trim() !== "" && s.trim() !== "-") span.className = `syl-${(i % 7) + 1}`; 
            display.appendChild(span);
        });
    }

    // --- Word-by-Word Audio Logic ---
    function playAudioWordByWord() {
        window.speechSynthesis.cancel();
        const currentPhrase = session.queue[session.idx].w;
        // Clean up punctuation (keep apostrophes for words like people's)
        const cleanPhrase = currentPhrase.replace(/[-]/g, " ");

        if (cleanPhrase.includes(" ")) {
            // It's a phrase (has spaces) -> Word by Word breakdown
            const words = cleanPhrase.split(" ").filter(w => w.trim() !== "");
            let wordIndex = 0;

            function speakNext() {
                if (wordIndex >= words.length) return;
                const u = new SpeechSynthesisUtterance(words[wordIndex]);
                u.rate = 0.7; // Moderate speed for individual words
                u.lang = 'en-GB';
                const voice = getBritishVoice();
                if (voice) u.voice = voice;

                u.onend = () => {
                    wordIndex++;
                    setTimeout(speakNext, 300); // 0.3s Pause between words for weak students
                };
                window.speechSynthesis.speak(u);
            }
            speakNext();
        } else {
            // It's a single word -> Super slow speed
            const u = new SpeechSynthesisUtterance(cleanPhrase);
            u.rate = 0.5; // Very slow for single words
            u.lang = 'en-GB';
            const voice = getBritishVoice();
            if (voice) u.voice = voice;
            window.speechSynthesis.speak(u);
        }
    }

    function activateMic() {
        if (isSpeaking) return;
        recognition.start();
        isSpeaking = true;
        document.getElementById('mic-btn').classList.add('mic-listening');
        document.getElementById('mic-status').innerText = "Listening...";
    }

    function checkSpeech(transcript) {
        const target = session.queue[session.idx].w.toLowerCase();
        
        // Clean both target and spoken transcript: replace hyphens with spaces, then remove all non-alphanumeric chars
        let cleanTarget = target.replace(/[-]/g, " ").replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ").trim();
        let said = transcript.toLowerCase().replace(/[-]/g, " ").replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ").trim();

        // Edge case handling (e.g. if Speech engine reads "ivory trading" as something close)
        if (said.includes(cleanTarget) || cleanTarget.includes(said) || stringSimilarity(cleanTarget, said) > 0.8) {
            document.getElementById('feedback-speak').innerText = `✅ Good! You said: "${transcript}"`;
            document.getElementById('feedback-speak').style.color = "green";
            session.scoreSpeak++;
            session.logs.push({ w: session.queue[session.idx].w, s: 1, m: 0 });
            setTimeout(startMatch, 1500);
        } else {
            attempts++;
            if (attempts < 2) {
                document.getElementById('feedback-speak').innerText = `⚠️ Try again. You said: "${transcript}"`;
                document.getElementById('feedback-speak').style.color = "#d84315";
            } else {
                document.getElementById('feedback-speak').innerText = `❌ Skipped. Phrase was: ${session.queue[session.idx].w}`;
                document.getElementById('feedback-speak').style.color = "#c62828";
                session.logs.push({ w: session.queue[session.idx].w, s: 0, m: 0 });
                setTimeout(startMatch, 2500); // Wait longer so they can read the long phrase
            }
        }
    }

    // Basic string similarity helper for slight mispronunciations 
    function stringSimilarity(s1, s2) {
        if (s1 === s2) return 1.0;
        let longer = s1.length > s2.length ? s1 : s2;
        let shorter = s1.length > s2.length ? s2 : s1;
        if (longer.length == 0) return 1.0;
        return (longer.length - editDistance(longer, shorter)) / parseFloat(longer.length);
    }
    function editDistance(s1, s2) {
        let costs = [];
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i == 0) costs[j] = j;
                else if (j > 0) {
                    let newValue = costs[j - 1];
                    if (s1.charAt(i - 1) != s2.charAt(j - 1))
                        newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                    costs[j - 1] = lastValue;
                    lastValue = newValue;
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        return costs[s2.length];
    }

    // Phase 2: Match
    function startMatch() {
        document.getElementById('phase-speak').classList.add('hidden');
        document.getElementById('phase-match').classList.remove('hidden');
        document.getElementById('feedback-match').innerText = "";
        attempts = 0;

        const current = session.queue[session.idx];
        document.getElementById('match-word').innerText = current.w;

        let all = [...vocabData.Core, ...vocabData.Intermediate, ...vocabData.Advanced];
        let distractors = all.filter(x => x.w !== current.w).sort(() => 0.5 - Math.random()).slice(0, 2);
        let opts = [current, ...distractors].sort(() => 0.5 - Math.random());

        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        opts.forEach(o => {
            const d = document.createElement('div');
            d.className = 'option-card';
            d.innerText = o.m;
            d.onclick = () => checkMatch(d, o.w === current.w);
            container.appendChild(d);
        });
    }

    function checkMatch(div, isCorrect) {
        if (div.style.opacity === "0.5") return;

        if (isCorrect) {
            div.style.background = "#dcedc8";
            div.style.borderColor = "#2e7d32";
            document.getElementById('feedback-match').innerText = "✅ Correct!";
            document.getElementById('feedback-match').style.color = "#2e7d32";
            session.scoreMatch++;
            session.logs[session.logs.length - 1].m = 1;
            disableOpts();
            setTimeout(nextWord, 1000);
        } else {
            attempts++;
            div.style.background = "#ffcdd2";
            div.style.opacity = "0.5";
            if (attempts < 2) {
                document.getElementById('feedback-match').innerText = "⚠️ Wrong. 1 attempt left.";
                document.getElementById('feedback-match').style.color = "#d84315";
            } else {
                document.getElementById('feedback-match').innerText = "❌ Incorrect.";
                document.getElementById('feedback-match').style.color = "#c62828";
                disableOpts();
                setTimeout(nextWord, 1500);
            }
        }
    }

    function disableOpts() {
        document.querySelectorAll('.option-card').forEach(d => {
            d.onclick = null;
            if(d.style.background !== "rgb(220, 237, 200)") d.style.opacity = "0.5";
        });
    }

    function nextWord() {
        session.idx++;
        loadWord();
    }

    function endGame() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        
        document.getElementById('final-total').innerText = (session.scoreSpeak + session.scoreMatch) + " / " + (session.queue.length * 2);

        const tbody = document.getElementById('result-tbody');
        tbody.innerHTML = "";
        session.logs.forEach(l => {
            tbody.innerHTML += `<tr><td>${l.w}</td><td>${l.s?'✅':'❌'}</td><td>${l.m?'✅':'❌'}</td></tr>`;
        });
    }

    function exportCSV() {
        let csv = "\uFEFFStudent,Class,No,Level,Phrase,Speak,Match,Total\n";
        session.logs.forEach(l => {
            csv += `"${session.name}","${session.class}","${session.no}","${session.level}","${l.w}",${l.s},${l.m},${l.s+l.m}\n`;
        });
        csv += `SUMMARY,${session.class},${session.no},${session.level},ALL,${session.scoreSpeak},${session.scoreMatch},${session.scoreSpeak+session.scoreMatch}\n`;

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${session.name}_S3_Wildlife_Module5_Results.csv`;
        link.style.display = "none";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
